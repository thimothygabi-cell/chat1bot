<!DOCTYPE html>
<html>

<head>
  <title>My AI</title>

<style>

body{
margin:0;
font-family:Arial;
display:flex;
height:100vh;
background:#f5f5f5;
}

/* SIDEBAR */

.sidebar{
width:250px;
background:#202123;
color:white;
display:flex;
flex-direction:column;
padding:10px;
}

.new-chat{
background:#343541;
color:white;
border:none;
padding:12px;
border-radius:8px;
cursor:pointer;
margin-bottom:10px;
font-size:16px;
}

.chat-history{
flex:1;
overflow-y:auto;
}

.chat-item{
background:#2d2d2d;
padding:10px;
border-radius:8px;
margin-bottom:10px;
cursor:pointer;
}

.chat-item:hover{
background:#444;
}

/* MAIN */

.main{
flex:1;
display:flex;
flex-direction:column;
}

.header{
padding:15px;
background:white;
border-bottom:1px solid #ddd;
font-size:22px;
font-weight:bold;
}

#chatBox{
flex:1;
padding:20px;
overflow-y:auto;
}

.user{
background:#d1e7ff;
padding:12px;
border-radius:10px;
margin-bottom:10px;
max-width:70%;
margin-left:auto;
}

.ai{
background:white;
padding:12px;
border-radius:10px;
margin-bottom:10px;
max-width:70%;
border:1px solid #ddd;
}

.input-area{
display:flex;
padding:15px;
background:white;
border-top:1px solid #ddd;
}

input{
flex:1;
padding:12px;
font-size:16px;
border:1px solid #ccc;
border-radius:10px;
}

.send{
margin-left:10px;
padding:12px 20px;
font-size:16px;
border:none;
border-radius:10px;
background:black;
color:white;
cursor:pointer;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<button class="new-chat" onclick="newChat()">
+ New Chat
</button>

<div class="chat-history" id="chatHistory">
</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">
My AI Chatbot
</div>

<div id="chatBox"></div>

<div class="input-area">

<input
id="input"
placeholder="Ask anything...">

<button class="send" onclick="sendMessage()">
Send
</button>

</div>

</div>

<script>

const apiKey = "paste your key here";

let chats = [];
let currentChat = [];

function renderChat(){

const chatBox =
document.getElementById("chatBox");

chatBox.innerHTML = "";

currentChat.forEach(msg => {

chatBox.innerHTML += `

<div class="${msg.role}">
<b>${msg.role === 'user' ? 'You' : 'AI'}:</b>
${msg.text}
</div>

`;

});

chatBox.scrollTop =
chatBox.scrollHeight;

}

function saveCurrentChat(){

if(currentChat.length === 0) return;

chats.push([...currentChat]);

updateSidebar();

}

function updateSidebar(){

const history =
document.getElementById("chatHistory");

history.innerHTML = "";

chats.forEach((chat,index)=>{

const div =
document.createElement("div");

div.className = "chat-item";

div.innerText =
chat[0]?.text.substring(0,20) ||
`Chat ${index+1}`;

div.onclick = ()=>{

currentChat = [...chat];

renderChat();

};

history.appendChild(div);

});

}

function newChat(){

saveCurrentChat();

currentChat = [];

renderChat();

}

async function sendMessage(){

const input =
document.getElementById("input");

const userText =
input.value;

if(userText.trim() === "") return;

currentChat.push({
role:"user",
text:userText
});

renderChat();

input.value = "";

currentChat.push({
role:"ai",
text:"Typing..."
});

renderChat();

try{

const response = await fetch(

"https://openrouter.ai/api/v1/chat/completions",

{
method:"POST",

headers:{

"Authorization":
"Bearer " + apiKey,

"Content-Type":"application/json",

"HTTP-Referer":
"https://tech1bot.neocities.org/"

},

body:JSON.stringify({

model:
"deepseek/deepseek-chat-v3-0324",

messages:[

{
role:"system",
content:
"Reply only in English"
},

{
role:"user",
content:userText
}

]

})

}

);

const data =
await response.json();

console.log(data);

currentChat.pop();

if(data.error){

currentChat.push({
role:"ai",
text:data.error.message
});

renderChat();

return;

}

currentChat.push({
role:"ai",
text:data.choices[0].message.content
});

renderChat();

}

catch(error){

console.log(error);

currentChat.pop();

currentChat.push({
role:"ai",
text:"Error loading AI"
});

renderChat();

}

}

/* ENTER KEY */

document.getElementById("input")
.addEventListener("keypress", function(event){

if(event.key === "Enter"){

sendMessage();

}

});

</script>

</body>
</html>
